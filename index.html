<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=856, initial-scale=1.0">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:856px; height:540px; overflow:hidden; }
.carne {
  width:856px; height:540px;
  display:flex; flex-direction:column;
  font-family: Georgia, serif;
}
.header {
  display:flex; align-items:center; gap:12px;
  padding:14px 20px 10px;
  border-bottom: 1px solid rgba(255,255,255,0.3);
}
.header img { width:40px; height:40px; }
.org { font-size:22px; font-weight:bold; }
.lema { font-size:11px; letter-spacing:2px; text-transform:uppercase; opacity:0.7; }
.badge {
  margin-left:auto; font-size:10px; font-weight:bold;
  letter-spacing:1px; text-transform:uppercase;
  background:rgba(255,255,255,0.25); padding:4px 12px; border-radius:4px;
}
.body { flex:1; display:flex; padding:16px 20px; gap:20px; }
.info { flex:1; display:flex; flex-direction:column; justify-content:space-between; }
.nombre { font-size:28px; font-weight:bold; line-height:1.2; }
.tipo-txt { font-size:13px; font-weight:bold; letter-spacing:1px; text-transform:uppercase; margin-top:4px; opacity:0.7; }
.datos { display:flex; flex-direction:column; gap:8px; }
.etq { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; font-weight:bold; opacity:0.6; }
.val { font-size:16px; font-weight:bold; letter-spacing:0.5px; }
.qrbox { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; }
.qrbox img { width:120px; height:120px; background:white; padding:6px; border-radius:6px; }
.qrlbl { font-size:10px; letter-spacing:1px; text-transform:uppercase; opacity:0.6; }
.footer {
  padding:6px 20px;
  display:flex; justify-content:space-between; align-items:center;
  background:rgba(0,0,0,0.15);
  border-top: 1px solid rgba(255,255,255,0.2);
  font-size:11px; opacity:0.7;
}
</style>
</head>

<script>

const tipo = p.get('tipo') || 'Socio/a Colaborador/a';
const colores = {

  'Socio/a Fundador/a':    { bg: '#2D6A2D', txt: '#ffffff' },
  'Junta Directiva':       { bg: '#5fad52', txt: '#ffffff' },
  'Socio/a Colaborador/a': { bg: '#61CE70', txt: '#1A4A2E' },
  'Socio/a Numerario/a':   { bg: '#F5D000', txt: '#3D2E00' },
  'Voluntario/a':          { bg: '#F47920', txt: '#5a2000' },
};
const c = colores[tipo] || colores['Socio/a Colaborador/a'];
document.querySelector('.carne').style.background = c.bg;
document.querySelector('.carne').style.color = c.txt;
document.querySelector('.nombre').textContent = p.get('nombre') || 'Nombre Apellidos';
document.querySelector('.tipo-txt').textContent = tipo;
document.querySelector('#badge').textContent = p.get('label') || tipo;
document.querySelector('#socio-id').textContent = p.get('id') || '0000-WB-00000-S';
document.querySelector('#fecha').textContent = p.get('alta') || '';
</script>
